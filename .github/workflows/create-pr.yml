name: Auto Create PR

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v3

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for this branch
          PR_EXISTS=$(gh pr list --head "${{ github.ref_name }}" --json url -q 'length')
          
          if [ "$PR_EXISTS" == "0" ]; then
            echo "No PR exists for ${{ github.ref_name }}. Creating one..."
            gh pr create \
              --base main \
              --head "${{ github.ref_name }}" \
              --title "New Branch: ${{ github.ref_name }}" \
              --body "This Pull Request was automatically generated from the pushed branch \`${{ github.ref_name }}\`."
          else
            echo "A PR already exists for this branch."
          fi
