name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            LAST_VERSION="1.0.0"
          else
            LAST_VERSION="${LAST_TAG#v}"
          fi

          if [ -z "$LAST_TAG" ]; then
            SUBJECTS=$(git log --pretty=format:"%s")
            BODIES=$(git log --pretty=format:"%b")
          else
            SUBJECTS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
            BODIES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%b")
          fi

          BUMP="patch"
          if echo "$SUBJECTS" | grep -qE "^[a-z]+(\([^)]+\))?!:" || echo "$BODIES" | grep -qE "^BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$SUBJECTS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Last tag '$LAST_TAG' is not a valid vMAJOR.MINOR.PATCH tag." >&2
            exit 1
          fi
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          if git rev-parse "refs/tags/v$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag v$NEW_VERSION already exists — skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Inject Version into Source
        if: steps.version.outputs.skip != 'true'
        run: |
          sed -i "s/Version:           VERSION/Version:           ${{ steps.version.outputs.new_version }}/" wp-media-library.php
          sed -i "s/define( 'WPMF_VERSION', 'VERSION' )/define( 'WPMF_VERSION', '${{ steps.version.outputs.new_version }}' )/" wp-media-library.php

      - name: Setup Node
        if: steps.version.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Package Plugin
        if: steps.version.outputs.skip != 'true'
        run: |
          npm ci
          npm run package

      - name: Tag and Release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" wp-media-library.zip \
            --title "WP Media Library ${{ steps.version.outputs.tag }}" \
            --generate-notes
